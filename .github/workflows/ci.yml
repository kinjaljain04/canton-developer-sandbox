name: Canton Developer Sandbox CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  faucet-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd faucet && npm ci
      - run: cd faucet && npm run build
      - run: cd faucet && npm test

  docker-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose -f docker/docker-compose.yml config
