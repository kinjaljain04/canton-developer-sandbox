canton {
  # Canton Sandbox Configuration
  #
  # This file configures a single Canton process running all necessary nodes
  # for a local development environment: a participant, a domain, a sequencer,
  # and a mediator. This setup is ideal for quick prototyping and testing
  # of Daml applications.

  # Automatically start all configured nodes.
  auto-init = true

  # Participant Node Configuration
  # This is the node where your Daml smart contracts (dars) will be uploaded
  # and where parties are hosted.
  participants {
    participant1 {
      # Use an in-memory database for simplicity. Data is lost on restart.
      storage.type = memory

      # Admin API for managing the participant (e.g., uploading dars, creating parties).
      admin-api {
        port = 5012
        address = "0.0.0.0" # Listen on all network interfaces inside the container
      }

      # Ledger API for applications to interact with the Daml ledger.
      ledger-api {
        port = 5011
        address = "0.0.0.0"

        # Enable the HTTP JSON API for web clients.
        json-api {
          enabled = true
          port = 7575
          address = "0.0.0.0"
        }
      }

      # Enable preview features, useful for development and testing.
      features.enable-preview-commands = yes
    }
  }

  # Domain Configuration
  # The domain provides connectivity and ordering services between participants.
  domains {
    mydomain {
      storage.type = memory
      public-api {
        port = 5018
        address = "0.0.0.0"
      }
      admin-api {
        port = 5019
        address = "0.0.0.0"
      }
      # Set domain-level parameters. A short reconciliation interval provides
      # faster feedback during development.
      domain-parameters {
        reconciliation-interval = 1s
      }
    }
  }

  # Sequencer Configuration
  # The sequencer is responsible for ordering messages for the domain.
  sequencers {
    mysequencer {
      type = database # A simple, self-contained sequencer type.
      storage.type = memory
      public-api {
        port = 5021
        address = "0.0.0.0"
      }
      admin-api {
        port = 5022
        address = "0.0.0.0"
      }
    }
  }

  # Mediator Configuration
  # The mediator confirms the finality of transactions.
  mediators {
    mymediator {
      storage.type = memory
      public-api {
        port = 5023
        address = "0.0.0.0"
      }
      admin-api {
        port = 5024
        address = "0.0.0.0"
      }
    }
  }

  # Initialization Script
  # This script runs after the nodes have started, connecting them together.
  initialization.script = """
    participants.participant1.domains.connect_local(domains.mydomain)
  """

  # Monitoring Configuration
  # Provides health check endpoints.
  monitoring.health {
    enabled = true
    server {
      port = 5025
      address = "0.0.0.0"
    }
  }
}